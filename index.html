    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f1117;
            --bg-secondary: #1a1d29;
            --bg-tertiary: #242933;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --border: #30363d;
            --success: #3fb950;
            --danger: #f85149;
            --warning: #d29922;
            --accent: #58a6ff;
        }

        body.light-mode {
            --bg-primary: #ffffff;
            --bg-secondary: #f6f8fa;
            --bg-tertiary: #eaeef2;
            --text-primary: #24292f;
            --text-secondary: #57606a;
            --border: #d0d7de;
            --success: #1a7f37;
            --danger: #d1242f;
            --warning: #bf8700;
            --accent: #0969da;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: background-color 0.3s, color 0.3s;
        }

        header {
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        h1 {
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .bee-emoji {
            font-size: 28px;
        }

        .previous-names {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: normal;
        }

        .header-controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .theme-toggle {
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.2s;
        }

        .theme-toggle:hover {
            background-color: var(--border);
        }

        .quote {
            font-style: italic;
            color: var(--text-secondary);
            font-size: 13px;
            margin-top: 10px;
            width: 100%;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .kpi-card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .kpi-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .kpi-value {
            font-size: 24px;
            font-weight: bold;
            color: var(--accent);
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            gap: 0;
            margin-bottom: 20px;
            overflow-x: auto;
        }

        .tab-button {
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            color: var(--text-secondary);
            padding: 15px 20px;
            cursor: pointer;
            font-size: 14px;
            transition: color 0.2s, border-color 0.2s;
            white-space: nowrap;
        }

        .tab-button:hover {
            color: var(--text-primary);
        }

        .tab-button.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.2s;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .chart-container {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .chart-container canvas {
            max-height: 350px;
        }

        @media (max-width: 768px) {
            .chart-container canvas {
                max-height: 250px;
            }

            .kpi-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            h1 {
                font-size: 18px;
            }
        }

        @media (max-width: 480px) {
            .chart-container canvas {
                max-height: 200px;
            }

            .kpi-grid {
                grid-template-columns: 1fr;
            }

            header {
                padding: 15px;
            }

            .tabs {
                font-size: 12px;
            }

            .tab-button {
                padding: 10px 12px;
            }
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: var(--bg-secondary);
            border-radius: 8px;
            overflow: hidden;
        }

        thead {
            background-color: var(--bg-tertiary);
        }

        th {
            padding: 12px;
            text-align: left;
            font-size: 13px;
            text-transform: uppercase;
            color: var(--text-secondary);
            font-weight: 600;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }

        tr:hover {
            background-color: var(--bg-tertiary);
        }

        .table-wrapper {
            overflow-x: auto;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 15px;
        }

            display: flex;
            gap: 10px;
            align-items: center;

        }

        select, input {

            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
        }

        select:focus, input:focus {

            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(88, 166, 255, 0.2);
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            align-items: center;
            margin-top: 15px;
        }

        button {
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: background-color 0.2s;
        }

        button:hover:not(:disabled) {
            background-color: var(--border);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .entity-detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .entity-card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 8px;
        }

        .entity-card h3 {
            margin-bottom: 15px;
            color: var(--accent);
        }

        .entity-field {
            margin-bottom: 12px;
            font-size: 13px;
        }

        .entity-label {
            color: var(--text-secondary);
            font-weight: 500;
        }

        .recon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .recon-card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 8px;
        }

        .recon-card.reconciled {
            border-left: 4px solid var(--success);
        }

        .recon-card.mismatch {
            border-left: 4px solid var(--danger);
        }

        .recon-status {
            font-weight: 600;
            margin-top: 10px;
            font-size: 13px;
        }

        .recon-status.success {
            color: var(--success);
        }

        .recon-status.error {
            color: var(--danger);
        }

        .bs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .bs-section {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 8px;
        }

        .bs-section h3 {
            margin-bottom: 15px;
            color: var(--accent);
        }

        .bs-section table {
            font-size: 12px;
        }

        .bs-section td {
            padding: 8px;
        }

        .bs-total {
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
            text-align: right;
            font-weight: 600;
        }

        .bs-alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 500;
            text-align: center;
        }

        .bs-alert.balanced {
            background-color: rgba(63, 185, 80, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
        }

        .bs-alert.unbalanced {
            background-color: rgba(248, 81, 73, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
        }

        .placeholder {
            background-color: var(--bg-secondary);
            border: 1px dashed var(--border);
            padding: 40px;
            border-radius: 8px;
            text-align: center;
            color: var(--text-secondary);
        }

        .spending-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 900px) {
            .spending-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

        function displayRandomQuote() {

            if (elem) {
                elem.textContent = '"' + QUOTES[idx] + '"';

        function toggleTheme() {
            var body = document.body;
            var isDark = body.classList.contains("light-mode");
            if (isDark) {
                body.classList.remove("light-mode");
                localStorage.setItem("theme", "dark");
                document.querySelector(".theme-toggle").textContent = "🌙 Dark Mode";
            } else {
                body.classList.add("light-mode");
                localStorage.setItem("theme", "light");
                document.querySelector(".theme-toggle").textContent = "☀️ Light Mode";
            }
        }

        function formatCurrency(val) {
            if (isNaN(val)) return "R 0.00";
            var isNeg = val < 0;
            val = Math.abs(val);
            var formatted = "R " + val.toLocaleString("en-ZA", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            if (isNeg) {
                formatted = formatted.replace("R ", "R -");
            }
            return formatted;
        }

        function formatDate(dateStr) {
            var d = new Date(dateStr + "T00:00:00Z");

        function showTab(tabId) {
            var contents = document.querySelectorAll(".tab-content");
            contents.forEach(function(el) {
                el.classList.remove("active");
            });

            var buttons = document.querySelectorAll(".tab-button");
            buttons.forEach(function(el) {
                el.classList.remove("active");
            });

            var tab = document.getElementById(tabId);
            if (tab) {
                tab.classList.add("active");
            }

            var btn = document.getElementById("btn-" + tabId);
            if (btn) {
                btn.classList.add("active");
            }

            // Render charts if needed
            if (tabId === "overview") {
                setTimeout(function() {
                    renderTrendChart();
                    renderExpenseChart();
                }, 100);
            } else if (tabId === "spending") {
                setTimeout(function() {
                    renderSpendingPieChart();
                    renderSpendingBarChart();
                }, 100);
            } else if (tabId === "cashflow") {
                setTimeout(function() {
                    renderCashFlowChart();
                }, 100);
            } else if (tabId === "bankstatements") {
                renderBankStatements();
            } else if (tabId === "bankrecon") {
                renderBankRecon();
            } else if (tabId === "incomestatement") {
                renderIncomeStatement();
            } else if (tabId === "balancesheet") {
                renderBalanceSheet();
            }
        }

        function renderTrendChart() {
            var canvas = document.getElementById("trendChart");
            if (!canvas || CHARTS.trend) return;

            var monthlyData = {};
            TRANSACTIONS_DATA.forEach(function(txn) {
                if (txn.allocation === "Income Statement") {
                    var month = txn.date.substring(0, 7);
                    if (!monthlyData[month]) {
                        monthlyData[month] = { income: 0, expenses: 0 };
                    }
                    var amt = txn.amount || 0;
                    if (amt > 0) {
                        monthlyData[month].income += amt;
                    } else {
                        monthlyData[month].expenses += Math.abs(amt);
                    }
                }
            });

            var months = Object.keys(monthlyData).sort().slice(-12);
            var incomeValues = months.map(function(m) { return monthlyData[m].income; });
            var expenseValues = months.map(function(m) { return monthlyData[m].expenses; });

            CHARTS.trend = new Chart(canvas, {
                type: "bar",
                data: {
                    labels: months,
                    datasets: [
                        { label: "Income", data: incomeValues, backgroundColor: "#3fb950" },
                        { label: "Expenses", data: expenseValues, backgroundColor: "#f85149" }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: { legend: { position: "top" } }
                }
            });
        }

        function renderExpenseChart() {
            var canvas = document.getElementById("expenseChart");
            if (!canvas || CHARTS.expense) return;

            var categories = {};
            TRANSACTIONS_DATA.forEach(function(txn) {
                if (txn.allocation === "Income Statement" && txn.amount < 0) {
                    var cat = txn.category || "Uncategorized";
                    categories[cat] = (categories[cat] || 0) + Math.abs(txn.amount);
                }
            });

            var sortedCats = Object.entries(categories).sort(function(a, b) { return b[1] - a[1]; });
            var catLabels = sortedCats.map(function(x) { return x[0]; });
            var catValues = sortedCats.map(function(x) { return x[1]; });

            CHARTS.expense = new Chart(canvas, {
                type: "pie",
                data: {
                    labels: catLabels,
                    datasets: [{ data: catValues, backgroundColor: ["#f85149", "#3fb950", "#58a6ff", "#d29922", "#a371f7"] }]
                },
                options: { responsive: true, maintainAspectRatio: true }
            });
        }

            var months = {};

        function renderSpendingBarChart() {
            var canvas = document.getElementById("spendingBarChart");
            if (!canvas || CHARTS.spendingBar) return;

            var monthlyCategories = {};
            TRANSACTIONS_DATA.forEach(function(txn) {
                if (txn.allocation === "Income Statement" && txn.amount < 0) {
                    var month = txn.date.substring(0, 7);
                    var cat = txn.category || "Uncategorized";

                    monthlyCategories[cat][month] = (monthlyCategories[cat][month] || 0) + Math.abs(txn.amount);

            var allMonths = {};
            Object.values(monthlyCategories).forEach(function(catData) {
                Object.keys(catData).forEach(function(m) { allMonths[m] = true; });

            var datasets = [];
            var colors = ["#f85149", "#3fb950", "#58a6ff", "#d29922", "#a371f7"];
            var colorIdx = 0;
            Object.entries(monthlyCategories).forEach(function(entry) {
                var cat = entry[0];
                var catData = entry[1];
                datasets.push({
                    label: cat,
                    data: sortedMonths.map(function(m) { return catData[m] || 0; }),
                    backgroundColor: colors[colorIdx % colors.length]
                });
                colorIdx++;

            CHARTS.spendingBar = new Chart(canvas, {
                type: "bar",
                data: { labels: sortedMonths, datasets: datasets },
                options: { responsive: true, stacked: true }

        function filterBankStatements(account) {
            CURRENT_ACCOUNT_FILTER = account;
            CURRENT_BANK_PAGE = 0;
            renderBankStatements();
        }

        function renderBankStatements() {
            var filtered = TRANSACTIONS_DATA.filter(function(t) {
                if (CURRENT_ACCOUNT_FILTER && t.account !== CURRENT_ACCOUNT_FILTER) return false;
                return true;
            });

            filtered = filtered.sort(function(a, b) {
                return new Date(b.date) - new Date(a.date);
            });

            FILTERED_BANK_TRANSACTIONS = filtered;
            displayBankStatementPage();
        }

        function displayBankStatementPage() {
            var tbody = document.getElementById("bankStatementsBody");
            if (!tbody) return;
            tbody.innerHTML = "";

            var start = CURRENT_BANK_PAGE * BANK_ROWS_PER_PAGE;
            var end = start + BANK_ROWS_PER_PAGE;
            var pageData = FILTERED_BANK_TRANSACTIONS.slice(start, end);

            pageData.forEach(function(txn) {
                var row = "<tr>" +
                         "<td>" + formatDate(txn.date) + "</td>" +
                         "<td>" + txn.bank + "</td>" +
                         "<td>" + txn.account + "</td>" +
                         "<td>" + txn.description + "</td>" +
                         "<td>" + (txn.amount > 0 ? formatCurrency(txn.amount) : "") + "</td>" +
                         "<td>" + (txn.amount < 0 ? formatCurrency(Math.abs(txn.amount)) : "") + "</td>" +
                         "<td>" + formatCurrency(txn.balance) + "</td>" +
                         "<td>" + txn.category + "</td>" +
                         "</tr>";
                tbody.innerHTML += row;
            });

            var totalPages = Math.ceil(FILTERED_BANK_TRANSACTIONS.length / BANK_ROWS_PER_PAGE);
            document.getElementById("pageInfo").textContent = "Page " + (CURRENT_BANK_PAGE + 1) + " of " + totalPages;
            document.getElementById("prevBtn").disabled = CURRENT_BANK_PAGE === 0;
            document.getElementById("nextBtn").disabled = CURRENT_BANK_PAGE >= totalPages - 1;
        }

        function previousBankPage() {
            if (CURRENT_BANK_PAGE > 0) {
                CURRENT_BANK_PAGE--;
                displayBankStatementPage();
            }
        }

        function nextBankPage() {
            var totalPages = Math.ceil(FILTERED_BANK_TRANSACTIONS.length / BANK_ROWS_PER_PAGE);
            if (CURRENT_BANK_PAGE < totalPages - 1) {
                CURRENT_BANK_PAGE++;
                displayBankStatementPage();
            }
        }

        function renderBalanceSheet() {
            var assetsBody = document.getElementById("assetsBody");
            var equityBody = document.getElementById("equityBody");
            var liabilitiesBody = document.getElementById("liabilitiesBody");
            var alert = document.getElementById("bsAlert");

            if (!assetsBody) return;
            assetsBody.innerHTML = "";
            equityBody.innerHTML = "";
            liabilitiesBody.innerHTML = "";

            var totalAssets = 0;
            var totalLiabilities = 0;
            var totalEquity = 0;

            // Build assets from trial balance
            TRIAL_BALANCE_DATA.forEach(function(tb) {
                if (tb.section === "ASSETS") {
                    var balance = (tb.debit || 0) - (tb.credit || 0);
                    assetsBody.innerHTML += "<tr><td>" + tb.account_name + "</td><td style=\"text-align:right\">" + formatCurrency(balance) + "</td></tr>";
                    totalAssets += balance;
                } else if (tb.section === "EQUITY") {
                    var balance = (tb.credit || 0) - (tb.debit || 0);
                    equityBody.innerHTML += "<tr><td>" + tb.account_name + "</td><td style=\"text-align:right\">" + formatCurrency(balance) + "</td></tr>";
                    totalEquity += balance;
                } else if (tb.section === "LIABILITIES") {
                    var balance = (tb.credit || 0) - (tb.debit || 0);
                    liabilitiesBody.innerHTML += "<tr><td>" + tb.account_name + "</td><td style=\"text-align:right\">" + formatCurrency(balance) + "</td></tr>";
                    totalLiabilities += balance;
                }
            });

            // Add retained earnings from P&L
            var ytdNetPL = 0;
            TRANSACTIONS_DATA.forEach(function(txn) {
                if (txn.allocation === "Income Statement") {
                    ytdNetPL += (txn.amount || 0);
                }
            });
            equityBody.innerHTML += "<tr><td><strong>Retained Earnings</strong></td><td style=\"text-align:right\"><strong>" + formatCurrency(ytdNetPL) + "</strong></td></tr>";
            totalEquity += ytdNetPL;

            document.getElementById("totalAssets").textContent = formatCurrency(totalAssets);
            document.getElementById("totalLiabilities").textContent = formatCurrency(totalLiabilities);
            document.getElementById("totalEquity").textContent = formatCurrency(totalEquity);

            var difference = Math.abs(totalAssets - (totalEquity + totalLiabilities));
            if (Math.abs(difference) < 0.01) {
                alert.innerHTML = "<div class=\"bs-alert balanced\">Perfectly balanced, as all things should be. ✓</div>";
            } else {
                alert.innerHTML = "<div class=\"bs-alert unbalanced\">This is not a Balance Sheet... this is just a Sheet. Out of balance by " + formatCurrency(difference) + "</div>";
            }
        }

            });
        }

        // Load theme preference
        function loadTheme() {
            var theme = localStorage.getItem("theme");
            if (theme === "light") {
                document.body.classList.add("light-mode");
                document.querySelector(".theme-toggle").textContent = "☀️ Light Mode";
            }
        }

        // Initialize on load
        loadTheme();
        init();
    </script>
</body>
</html>
